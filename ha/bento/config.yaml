# Bento: sink everything published to the local NATS broker into Parquet files
# that DuckDB reads on demand.
#
# Runs as a host-networked OCI container, so the NATS client port is reachable
# at 127.0.0.1:4222. Messages that arrive over NATS' MQTT listener (Home
# Assistant via mqtt_statestream, Frigate) are republished on NATS subjects
# with '/' translated to '.', e.g. MQTT topic `frigate/events` -> subject
# `frigate.events`.
#
# `subject: ">"` captures every subject — the broadest "sink it all" default.
# Narrow it (e.g. `frigate.>`) if you only want a subset and want to skip
# NATS/MQTT internal traffic.
input:
  nats:
    urls:
      - nats://127.0.0.1:4222
    subject: ">"
    queue: bento-duckdb

# Re-batch the per-message NATS stream before encoding. Both the nats input and
# the file output are per-message, so the batch policy lives in a memory
# buffer: flush when 1000 messages accumulate OR 10s elapses, whichever comes
# first. Each flushed batch becomes exactly one Parquet file, which keeps the
# file count and per-file overhead sane.
#
# Trade-off: the memory buffer acks messages to NATS as it accepts them, so a
# hard crash loses at most one un-flushed batch (≤10s of data). That's fine for
# a telemetry sink; swap to an output that batches natively if you ever need
# stricter at-least-once delivery.
buffer:
  memory:
    batch_policy:
      enabled: true
      count: 1000
      period: 10s

# Per message: capture the originating subject, the raw payload, and an ISO
# ingest timestamp. The per-output parquet_encode (below) then collapses each
# batch into a single Parquet file. zstd compresses well — the payloads are
# repetitive JSON state dumps.
pipeline:
  processors:
    - mapping: |
        root.ts      = now().ts_format("2006-01-02T15:04:05.999999999Z07:00")
        root.subject = meta("nats_subject")
        root.payload = content().string()

# Two Parquet sinks, fanned out from the same {ts, subject, payload} batch:
#
#   1. nats/ — EVERY subject (Frigate, Home Assistant, MQTT/JS internals). The
#      catch-all analytics dump, queried ad-hoc with DuckDB.
#   2. ha/   — Home Assistant only. A clean, low-volume, UTF-8-safe landing
#      zone for the shenas-kiosk Home Assistant source. That source cannot read
#      the catch-all stream: it mixes in binary Frigate snapshot payloads that
#      break a string read, HA is only ~5% of rows, and the file count is
#      enormous. The `mapping` drops every non-`homeassistant.` message from the
#      batch before encoding.
#
# Each branch parquet_encodes independently and writes its batch to its own
# immutable Parquet file under a Hive-style day partition (dt=YYYY-MM-DD).
# Unique filenames (unix-nano + a per-branch counter) are MANDATORY: the file
# output's all-bytes codec OVERWRITES an existing path. Outputs create parent
# dirs automatically. Nothing holds the files open, so DuckDB can read them at
# any time — e.g.:
#   SELECT * FROM read_parquet('/data/nats/**/*.parquet', hive_partitioning=true);
output:
  broker:
    pattern: fan_out
    outputs:
      - file:
          path: '/data/nats/dt=${! now().ts_format("2006-01-02") }/${! timestamp_unix_nano() }-${! count("parquet_files_all") }.parquet'
          codec: all-bytes
        processors:
          - parquet_encode: &parquet_encode
              schema:
                - { name: ts,      type: UTF8 }
                - { name: subject, type: UTF8 }
                - { name: payload, type: UTF8 }
              default_compression: zstd
      - file:
          path: '/data/ha/dt=${! now().ts_format("2006-01-02") }/${! timestamp_unix_nano() }-${! count("parquet_files_ha") }.parquet'
          codec: all-bytes
        processors:
          # Keep only Home Assistant messages; drop the rest from the batch.
          # Bloblang `if` with no `else` leaves matching messages unchanged and
          # deletes the others, so only homeassistant.* survives to encode.
          - mapping: |
              root = if !this.subject.has_prefix("homeassistant.") { deleted() }
          - parquet_encode: *parquet_encode
