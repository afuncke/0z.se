# Frigate configuration — tracked in git.
#
# Bind-mounted READ-ONLY into the container at /config/config.yml (see
# ../configuration.nix). Edit here, commit, push, then redeploy + restart the
# frigate container. Frigate's DB/model-cache and recordings live in the
# writable volumes (/var/lib/home-assistant/frigate/{config,media}), not git.
#
# Secrets: RTSP passwords use {FRIGATE_RTSP_PASSWORD}, supplied from
# /var/lib/home-assistant/frigate/frigate.env on the box (never committed).

mqtt:
  enabled: true
  host: 127.0.0.1 # the local NATS MQTT broker (services.nats)
  port: 1883

# Object detection on the Intel iGPU via OpenVINO (needs /dev/dri).
detectors:
  ov:
    type: openvino
    device: GPU

# Bundled OpenVINO SSDLite MobileNet v2 model (ships in the Frigate image).
model:
  width: 300
  height: 300
  input_tensor: nhwc
  input_pixel_format: bgr
  path: /openvino-model/ssdlite_mobilenet_v2.xml
  labelmap_path: /openvino-model/coco_91cl_bkgr.txt

# Intel iGPU hardware-accelerated video decode.
ffmpeg:
  hwaccel_args: preset-vaapi

record:
  enabled: true
  continuous:
    days: 3 # continuous retention for 3 days (record.retain was renamed to
            # record.continuous in Frigate 0.16; mode: all is implicit here)
  alerts:
    retain:
      days: 30
  detections:
    retain:
      days: 30

snapshots:
  enabled: true
  retain:
    default: 14

# ---------------------------------------------------------------------------
# Tapo cameras (.102 / .103 / .104), one block per physical camera.
#
# Tapo RTSP needs a dedicated "Camera Account" created in the Tapo app
# (Settings > Advanced Settings > Camera Account) — NOT your TP-Link login.
# Set those creds in frigate.env on the box (not git):
#   FRIGATE_RTSP_USER=...
#   FRIGATE_RTSP_PASSWORD=...
#
# Tapo streams: stream1 = main/high-res (record), stream2 = substream (detect).
# detect width/height MUST match the stream2 resolution (often 640x360 — verify
# yours, e.g. with ffprobe, and adjust).
# ---------------------------------------------------------------------------
cameras:
  cam_102:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.102:554/stream2
          roles: [detect]
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.102:554/stream1
          roles: [record]
    detect:
      enabled: true
      width: 640
      height: 360
      fps: 5
    objects:
      track: [person]

  cam_103:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.103:554/stream2
          roles: [detect]
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.103:554/stream1
          roles: [record]
    detect:
      enabled: true
      width: 640
      height: 360
      fps: 5
    objects:
      track: [person]

  cam_104:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.104:554/stream2
          roles: [detect]
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.104:554/stream1
          roles: [record]
    detect:
      enabled: true
      width: 640
      height: 360
      fps: 5
    objects:
      track: [person]
