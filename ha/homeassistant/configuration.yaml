# Home Assistant configuration — tracked in git.
#
# This file is bind-mounted READ-ONLY into the container at
# /config/configuration.yaml (see ../configuration.nix). Edit it here, commit,
# push, then `nixos-rebuild switch` on the machine to apply — it cannot be
# edited from the HA UI.
#
# The !include targets below are NOT tracked: HA writes them via the UI and
# they live in the writable /config volume (/srv/home-assistant) on the
# machine. Same for secrets.yaml and .storage/.

# Standard HA defaults (frontend, history, discovery, energy, etc.)
default_config:

# Listen on all IPv4 interfaces (HA's default, made explicit here). The
# container uses host networking, so this binds the host's 0.0.0.0:8123;
# LAN access is already allowed by the firewall (port 8123 in configuration.nix).
http:
  server_host: 0.0.0.0
  server_port: 8123

# UI-managed lists. Kept out of git so the editors in the HA UI keep working.
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Publish every state change to the MQTT broker (NATS, on 127.0.0.1:1883).
# Requires the MQTT integration to be connected to that broker first (one-time
# UI step: Settings > Devices & Services > Add Integration > MQTT, host
# 127.0.0.1, port 1883). Topics are published under <base_topic>/...
mqtt_statestream:
  base_topic: homeassistant
  publish_attributes: false
  publish_timestamps: true

# To pull more config into git, add the file under ha/homeassistant/ and mount
# it read-only in configuration.nix, e.g.:
#   "${./homeassistant/http.yaml}:/config/http.yaml:ro"
# then reference it here with `!include http.yaml`.
